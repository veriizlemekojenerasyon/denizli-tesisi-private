<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildirim Yonetimi - Kojenerasyon</title>
    <link rel="stylesheet" href="css/admin-bildirim.css">
    <link rel="stylesheet" href="css/mobile-system.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <div>
                <h1>Bildirim Yonetimi</h1>
                <p>Vardiya duyurularini ana sayfadaki kayan yazida yayinlayin.</p>
            </div>
            <div class="header-actions">
                <a href="anasayfa.html" class="btn btn-secondary">Ana Sayfa</a>
                <span class="current-user" id="currentUserName">Admin</span>
            </div>
        </header>

        <main class="layout">
            <section class="editor-panel">
                <h2 id="formTitle">Yeni Bildirim</h2>
                <form id="announcementForm">
                    <input type="hidden" id="announcementId">

                    <label for="announcementTitle">Bildirim Metni</label>
                    <textarea id="announcementTitle" rows="4" required placeholder="Ornek: 08-16 vardiyasi GM-1 yag seviyesi kontrol edilecek"></textarea>

                    <div class="form-grid">
                        <div>
                            <label for="announcementStartDate">Baslangic Tarihi</label>
                            <input type="date" id="announcementStartDate">
                        </div>
                        <div>
                            <label for="announcementEndDate">Bitis Tarihi</label>
                            <input type="date" id="announcementEndDate">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label for="announcementCategory">Kategori</label>
                            <select id="announcementCategory">
                                <option value="operation">Isletme</option>
                                <option value="maintenance">Bakim</option>
                                <option value="safety">Guvenlik</option>
                                <option value="shift">Vardiya</option>
                                <option value="general">Genel</option>
                            </select>
                        </div>
                        <div>
                            <label for="announcementShift">Vardiya</label>
                            <select id="announcementShift">
                                <option value="">Tum vardiyalar</option>
                                <option value="08-16">08-16</option>
                                <option value="16-24">16-24</option>
                                <option value="24-08">24-08</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label for="announcementPriority">Oncelik</label>
                            <select id="announcementPriority">
                                <option value="normal">Normal</option>
                                <option value="medium">Orta</option>
                                <option value="high">Kritik</option>
                            </select>
                        </div>
                        <div>
                            <label for="announcementTarget">Hedef</label>
                            <select id="announcementTarget">
                                <option value="all">Tum ekip</option>
                                <option value="operator">Operatorler</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>

                    <label for="announcementPageTarget">Sayfa Hedefi</label>
                    <select id="announcementPageTarget">
                        <option value="all">Tum sayfalar</option>
                        <option value="anasayfa">Ana sayfa</option>
                        <option value="vardiya">Vardiya takip</option>
                        <option value="saatlik">Saatlik veri girisi</option>
                        <option value="kojen-motor">Kojen motor veri</option>
                        <option value="kojen-enerji">Kojen enerji veri</option>
                        <option value="bakim">Bakim takibi</option>
                        <option value="stok">Stok takip</option>
                        <option value="admin">Admin sayfalari</option>
                    </select>

                    <label for="announcementAttachment">Dosya / Fotograf</label>
                    <input type="file" id="announcementAttachment" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
                    <input type="hidden" id="announcementAttachmentUrl">
                    <input type="hidden" id="announcementAttachmentName">

                    <label class="checkbox-row">
                        <input type="checkbox" id="announcementActive" checked>
                        <span>Aktif olarak yayinla</span>
                    </label>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="btnReset">Temizle</button>
                        <button type="submit" class="btn btn-primary" id="btnSave">Kaydet</button>
                    </div>
                </form>
            </section>

            <section class="list-panel">
                <div class="list-header">
                    <div>
                        <h2>Yayin Listesi</h2>
                        <p id="announcementCount">0 bildirim</p>
                    </div>
                    <button type="button" class="btn btn-danger" id="btnClearInactive">Pasifleri Sil</button>
                </div>

                <div class="ticker-preview">
                    <span>On izleme</span>
                    <div id="previewText">Aktif bildirim yok.</div>
                </div>

                <div class="announcement-list" id="announcementList"></div>
            </section>
        </main>
    </div>

    <script src="js/audit-log.js"></script>
    <script src="js/bildirim-sheets.js"></script>
    <script src="js/admin-bildirim.js"></script>
    <script src="js/global-duyurular.js"></script>
    <script src="js/logout-system.js"></script>
</body>
</html>
