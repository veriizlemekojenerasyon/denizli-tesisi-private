<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buhar Verisi Girişi - Kojenerasyon</title>
    <link rel="stylesheet" href="css/buhar-verisi.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mobile-system.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sol Navigasyon Menüsü -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="images/koruma_logo_1.png" alt="Logo" class="logo">
                    <div class="company-name">KOJENERASYON</div>
                </div>
            </div>
            <ul class="sidebar-menu"></ul>
            <div class="sidebar-footer">
                <div class="user-info" style="padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px;">
                    <span id="userNameDisplay" style="color: white; font-size: 13px; font-weight: 500;">Yükleniyor...</span>
                </div>
                <button class="logout-btn" id="sidebarLogout">Çıkış Yap</button>
            </div>
        </nav>

        <!-- Ana İçerik Alanı -->
        <div class="main-content">
            <!-- Üst Header -->
            <header class="header">
                <div class="header-top">
                    <div class="company-info">
                        <h1>KORUMA KLOR ALKALİ ŞİRKETLER GRUBU</h1>
                        <h2>KOJENERASYON BÖLÜMÜ</h2>
                    </div>
                    <div class="user-info">
                        <span class="welcome-text" id="welcomeText">Hoşgeldin, <span id="userNameDisplay">Yükleniyor...</span></span>
                        <button class="logout-btn" id="headerLogout">Çıkış Yap</button>
                    </div>
                </div>
                <div class="header-bottom">
                    <h3>Buhar Verisi Girişi</h3>
                </div>
            </header>

            <!-- Ana İçerik -->
            <main class="content">
                <section class="data-entry-section">
                    <h2 class="section-title">Buhar Üretim Kayıtları</h2>

                    <!-- Veri Giriş Formu -->
                    <div class="form-section">
                        <h3 class="subsection-title">Buhar Değerleri</h3>
                        <form id="buharForm" class="data-form">
                            <!-- Tarih ve Buhar Bilgisi -->
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="buharTarih">TARIH (Bir Gün Önceki)</label>
                                    <input type="date" id="buharTarih" name="buharTarih" required readonly>
                                </div>
                                <div class="form-group">
                                    <label for="buharMiktari">BUHAR (TON)</label>
                                    <input type="number" id="buharMiktari" name="buharMiktari" step="0.01" placeholder="0.00" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="reset" class="reset-btn">TEMIZLE</button>
                                <button type="submit" class="submit-btn">KAYDET</button>
                            </div>
                            <div id="buharSaveStatus" class="save-status" aria-live="polite"></div>
                        </form>
                    </div>

                    <!-- Son Kayıtlar Tablosu -->
                    <div class="recent-records">
                        <h3 class="subsection-title">Son 32 Kayıt</h3>
                        <div class="table-container">
                            <table class="records-table" id="recordsTable">
                                <thead>
                                    <tr>
                                        <th>Sıra</th>
                                        <th>Tarih</th>
                                        <th>Buhar (Ton)</th>
                                        <th>Kaydeden</th>
                                    </tr>
                                </thead>
                                <tbody id="recordsTableBody">
                                    <!-- Kayıtlar JavaScript ile doldurulacak -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>


<script src="js/app-config.js"></script>
<script src="js/sidebar-menu.js"></script>
<script src="js/buhar-sheets.js"></script>

<script src="js/global-duyurular.js"></script>

<script src="js/auto-refresh.js"></script>

<script src="js/admin-menu-visibility.js"></script>

<script src="js/logout-system.js"></script>
</body>
</html>
