<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip Sistemi - Giriş</title>
    <link rel="stylesheet" href="css/giris.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="images/koruma_logo_1.png" alt="Logo" class="logo">
            </div>
            
            <form id="loginForm" class="login-form">
                <h2>Takip Sistemi</h2>
                <p class="subtitle">Hesabınıza giriş yapın</p>
                
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email" required placeholder="ornek@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required placeholder="Şifrenizi girin">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark"></span>
                        Beni hatırla
                    </label>
                    <a href="#" id="forgotPassword" class="forgot-link">Şifremi unuttum</a>
                </div>
                
                <button type="submit" class="login-btn">Giriş Yap</button>
                
                <div class="form-footer">
                    <a href="#" id="changePassword" class="change-password-link">Şifremi değiştir</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Şifremi Unuttum Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Şifremi Unuttum</h3>
            <p>E-posta adresinizi girin, şifre sıfırlama linkini size gönderelim.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetEmail">E-posta</label>
                    <input type="email" id="resetEmail" required placeholder="ornek@email.com">
                </div>
                <button type="submit" class="submit-btn">Şifre Sıfırlama Linki Gönder</button>
            </form>
        </div>
    </div>

    <!-- Şifre Değiştir Modal -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Şifre Değiştir</h3>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword">Mevcut Şifre</label>
                    <input type="password" id="currentPassword" required placeholder="Mevcut şifreniz">
                </div>
                <div class="form-group">
                    <label for="newPassword">Yeni Şifre</label>
                    <input type="password" id="newPassword" required placeholder="Yeni şifreniz">
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Yeni Şifre (Tekrar)</label>
                    <input type="password" id="confirmNewPassword" required placeholder="Yeni şifrenizi tekrar girin">
                </div>
                <button type="submit" class="submit-btn">Şifreyi Değiştir</button>
            </form>
        </div>
    </div>

    <script src="js/giris.js"></script>
</body>
</html>
